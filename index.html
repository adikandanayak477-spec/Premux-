<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - StudyHub</title>
    <!-- SUPABASE JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { color: #e2e8f0; background: #0f172a; background-image: radial-gradient(at 0% 0%, rgba(102, 126, 234, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(118, 75, 162, 0.15) 0px, transparent 50%); background-attachment: fixed; min-height: 100vh; display: flex; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); } ::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }
        
        .sidebar { width: 260px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: transform 0.3s ease; }
        .sidebar-header { padding: 2rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; }
        .nav-links { padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
        .nav-item { padding: 1rem 1.5rem; color: #94a3b8; text-decoration: none; border-radius: 12px; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(102, 126, 234, 0.15); color: #fff; border-left: 4px solid #667eea; }
        
        .main-content { flex: 1; margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; width: calc(100% - 260px); }
        header { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 1rem 2.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 90; }
        .header-title { font-size: 1.2rem; font-weight: 600; }
        .admin-profile { display: flex; align-items: center; gap: 15px; }
        .admin-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        
        .dashboard-container { padding: 2.5rem; flex: 1; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 1.5rem; border-radius: 16px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .stat-icon { font-size: 2rem; background: rgba(102, 126, 234, 0.2); padding: 1rem; border-radius: 12px; color: #a8c0ff; }
        .stat-info h4 { color: #94a3b8; font-size: 0.9rem; font-weight: 500; }
        .stat-info p { font-size: 1.5rem; font-weight: 700; color: #fff; }
        
        .management-grid { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 2rem; backdrop-filter: blur(10px); }
        .panel-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #cbd5e1; }
        .form-control { width: 100%; padding: 0.8rem 1rem; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #fff; font-size: 0.95rem; }
        .form-control:focus { outline: none; border-color: #667eea; background: rgba(255, 255, 255, 0.05); }
        .form-control option { background: #1e293b; color: #fff; }
        
        .file-upload-area { border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 2rem; text-align: center; background: rgba(0, 0, 0, 0.1); cursor: pointer; position: relative; transition: all 0.3s; }
        .file-upload-area:hover { border-color: #667eea; background: rgba(102, 126, 234, 0.05); }
        .file-upload-area input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        
        .btn-primary { width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 10px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 1rem; transition: transform 0.2s; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { color: #94a3b8; font-weight: 500; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        td { font-size: 0.95rem; color: #e2e8f0; }
        
        .type-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge-pdf { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-img { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
        
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .btn-delete:hover { background: #ef4444; color: white; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: rgba(16, 185, 129, 0.9); color: white; padding: 1rem 2rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; transform: translateX(150%); transition: transform 0.4s; z-index: 1000; }
        .toast.show { transform: translateX(0); }
        
        @media (max-width: 1024px) { .management-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo">⚙️ Admin Panel</div></div>
        <nav class="nav-links">
            <a href="#" class="nav-item active"><span>📊</span> Dashboard</a>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <div class="header-title">Content Manager</div>
            <div class="admin-profile"><span style="color: #94a3b8;">Admin User</span><div class="admin-avatar">A</div></div>
        </header>

        <div class="dashboard-container">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-info"><h4>Total Books</h4><p id="booksCount">0</p></div></div>
                <div class="stat-card"><div class="stat-icon">📄</div><div class="stat-info"><h4>Questions</h4><p id="questionsCount">0</p></div></div>
                <div class="stat-card"><div class="stat-icon">📝</div><div class="stat-info"><h4>Notes</h4><p id="notesCount">0</p></div></div>
            </div>

            <div class="management-grid">
                <!-- Upload Panel -->
                <div class="glass-panel">
                    <h3 class="panel-title">📤 Upload Material</h3>
                    <form id="uploadForm">
                        <div class="form-group"><label>Material Title</label><input type="text" class="form-control" id="matTitle" required placeholder="e.g. Algebra Chapter 1"></div>
                        <div class="form-group">
                            <label>Category</label>
                            <select class="form-control" id="matCategory" required>
                                <option value="Books">Books</option><option value="Questions">Question Papers</option>
                                <option value="Syllabus">Syllabus</option><option value="Notes">Notes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Subject</label>
                            <select class="form-control" id="matSubject" required>
                                <option value="Mathematics">Mathematics</option><option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option><option value="Botany">Botany</option>
                                <option value="Zoology">Zoology</option><option value="English">English</option>
                                <option value="Odia">Odia</option><option value="Previous Years">Previous Years</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>File Type</label>
                            <select class="form-control" id="matType" required>
                                <option value="PDF">PDF Document</option><option value="IMG">Image (.jpg, .png)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Upload File</label>
                            <div class="file-upload-area">
                                <span style="font-size: 2rem; display: block; margin-bottom: 10px;">📁</span>
                                <span id="fileNameDisplay" style="color: #cbd5e1;">Select File</span>
                                <input type="file" id="matFile" required onchange="updateFileName(this)">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" id="submitBtn">Upload to Database</button>
                    </form>
                </div>

                <!-- Database Panel -->
                <div class="glass-panel">
                    <h3 class="panel-title">🗃️ Server Materials</h3>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>Title</th><th>Category</th><th>Subject</th><th>Format</th><th>Action</th></tr></thead>
                            <tbody id="materialsTableBody"><tr><td colspan="5">Loading data from Supabase...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"><span id="toastIcon">✅</span><span id="toastMsg">Action successful!</span></div>

    <script>
        // ==========================================
        // YOUR SUPABASE KEYS 
        // ==========================================
        const SUPABASE_URL = 'https://webmabumbypqvgtkzecv.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ZvNARUd5ZSRTujAB-JOXdA_hclSnRuh';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let materialsData = [];

        // Fetch Data from Supabase
        async function fetchMaterials() {
            const { data, error } = await supabase.from('study_materials').select('*').order('created_at', { ascending: false });
            
            if (error) {
                console.error('Error fetching:', error);
                return;
            }
            materialsData = data;
            renderTable();
        }

        // Render Table
        function renderTable() {
            const tbody = document.getElementById('materialsTableBody');
            tbody.innerHTML = '';

            if (materialsData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #64748b;">No materials in database. Upload some!</td></tr>`;
                return;
            }

            materialsData.forEach(mat => {
                const badgeClass = mat.file_type === 'PDF' ? 'badge-pdf' : 'badge-img';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 500;"><a href="${mat.file_url}" target="_blank" style="color:#a8c0ff; text-decoration: none;">${mat.title}</a></td>
                    <td>${mat.category}</td>
                    <td>${mat.subject}</td>
                    <td><span class="type-badge ${badgeClass}">${mat.file_type}</span></td>
                    <td><button class="btn-delete" onclick="deleteMaterial(${mat.id})">🗑️ Remove</button></td>
                `;
                tbody.appendChild(tr);
            });

            // Update stats counters
            document.getElementById('booksCount').innerText = materialsData.filter(m => m.category === 'Books').length;
            document.getElementById('questionsCount').innerText = materialsData.filter(m => m.category === 'Questions').length;
            document.getElementById('notesCount').innerText = materialsData.filter(m => m.category === 'Notes').length;
        }

        // Handle File Name Display
        function updateFileName(input) {
            const display = document.getElementById('fileNameDisplay');
            if(input.files && input.files[0]) {
                display.innerText = input.files[0].name;
                display.style.color = '#fff';
            }
        }

        // Upload to Supabase
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Uploading... Please wait";
            btn.disabled = true;

            const title = document.getElementById('matTitle').value;
            const category = document.getElementById('matCategory').value;
            const subject = document.getElementById('matSubject').value;
            const type = document.getElementById('matType').value;
            const file = document.getElementById('matFile').files[0];

            try {
                // 1. Upload File to Storage Bucket named 'materials'
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('materials')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 2. Get Public URL
                const { data: publicUrlData } = supabase.storage
                    .from('materials')
                    .getPublicUrl(fileName);
                
                const fileUrl = publicUrlData.publicUrl;

                // 3. Save to Database Table
                const { error: dbError } = await supabase.from('study_materials').insert([
                    { title, category, subject, file_type: type, file_url: fileUrl }
                ]);

                if (dbError) throw dbError;

                showToast('✅', 'Uploaded successfully!', '#10b981');
                this.reset();
                document.getElementById('fileNameDisplay').innerText = "Select File";
                document.getElementById('fileNameDisplay').style.color = '#cbd5e1';
                fetchMaterials(); // Refresh Table

            } catch (error) {
                alert("Upload failed: " + error.message + "\n\nMake sure your 'materials' bucket is set to Public.");
            } finally {
                btn.innerText = "Upload to Database";
                btn.disabled = false;
            }
        });

        // Delete from Database
        async function deleteMaterial(id) {
            if(confirm('Delete this material permanently?')) {
                const { error } = await supabase.from('study_materials').delete().eq('id', id);
                if (error) {
                    alert("Error deleting: " + error.message);
                } else {
                    showToast('🗑️', 'Material removed!', '#ef4444');
                    fetchMaterials();
                }
            }
        }

        // Toast Notification Function
        function showToast(icon, message, color) {
            const toast = document.getElementById('toast');
            document.getElementById('toastIcon').innerText = icon;
            document.getElementById('toastMsg').innerText = message;
            toast.style.background = `rgba(${color === '#10b981' ? '16, 185, 129' : '239, 68, 68'}, 0.9)`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Initial Fetch when page loads
        fetchMaterials();
    </script>
</body>
</html>
